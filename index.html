<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Syncq Technologies — Campus Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #faf9f7;
    --bg2: #f3f1ec;
    --white: #ffffff;
    --ink: #18160f;
    --ink2: #4a4640;
    --ink3: #9a9690;
    --rule: #e6e2da;
    --accent: #1d4ed8;
    --accent-bg: #eff4ff;
    --green: #16a34a;
    --green-bg: #f0fdf4;
    --green-border: #bbf7d0;
    --amber: #b45309;
    --amber-bg: #fffbeb;
    --red: #b91c1c;
    --red-bg: #fef2f2;
    --r: 12px;
    --rs: 8px;
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { background:var(--bg); color:var(--ink); font-family:'Geist',sans-serif; font-weight:400; -webkit-font-smoothing:antialiased; }

  nav {
    position:fixed; top:0; left:0; right:0; z-index:100;
    background:rgba(250,249,247,0.94); backdrop-filter:blur(14px);
    border-bottom:1px solid var(--rule); height:62px;
    display:flex; align-items:center; justify-content:space-between; padding:0 52px;
  }
  .logo-link { display:flex; align-items:center; gap:10px; text-decoration:none; color:var(--ink); font-weight:600; font-size:0.95rem; }
  .logo-mark { width:30px; height:30px; background:var(--ink); border-radius:7px; display:flex; align-items:center; justify-content:center; color:#fff; font-family:'Instrument Serif',serif; font-style:italic; font-size:1rem; }
  .nav-links { display:flex; align-items:center; gap:28px; }
  .nav-links a { color:var(--ink2); text-decoration:none; font-size:0.85rem; transition:color 0.15s; }
  .nav-links a:hover { color:var(--ink); }
  .btn { display:inline-flex; align-items:center; gap:6px; cursor:pointer; font-family:'Geist',sans-serif; border:none; border-radius:var(--rs); font-weight:500; transition:opacity 0.15s; }
  .btn-dark { background:var(--ink); color:#fff; padding:9px 20px; font-size:0.85rem; }
  .btn-dark:hover { opacity:0.8; }
  .btn-outline { background:var(--white); color:var(--ink); border:1px solid var(--rule); padding:11px 24px; font-size:0.875rem; }
  .btn-outline:hover { border-color:var(--ink2); }
  .btn-lg { padding:13px 28px; font-size:0.9rem; }

  section { padding:96px 52px; position:relative; }
  .container { max-width:1060px; margin:0 auto; }
  .label { font-size:0.7rem; font-weight:600; text-transform:uppercase; letter-spacing:0.12em; color:var(--ink3); display:block; margin-bottom:16px; }
  h1 { font-family:'Instrument Serif',serif; font-size:clamp(2.8rem,5.5vw,4.8rem); line-height:1.07; letter-spacing:-1px; font-weight:400; }
  h1 em { font-style:italic; color:var(--accent); }
  h2 { font-family:'Instrument Serif',serif; font-size:clamp(1.9rem,3.5vw,2.9rem); line-height:1.1; letter-spacing:-0.8px; font-weight:400; margin-bottom:14px; }
  h2 em { font-style:italic; }
  .lead { font-size:1.05rem; color:var(--ink2); line-height:1.75; font-weight:300; max-width:540px; }
  hr.rule { border:none; border-top:1px solid var(--rule); margin:0; }

  /* HERO */
  #hero { padding-top:148px; padding-bottom:100px; }
  .hero-grid { display:grid; grid-template-columns:1fr 340px; gap:72px; align-items:end; }
  .badge { display:inline-flex; align-items:center; gap:7px; background:var(--green-bg); border:1px solid var(--green-border); border-radius:50px; padding:5px 14px 5px 8px; font-size:0.75rem; color:var(--green); font-weight:500; margin-bottom:24px; }
  .badge-dot { width:6px; height:6px; background:var(--green); border-radius:50%; animation:blink 2s ease infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .hero-ctas { display:flex; gap:10px; margin-top:36px; flex-wrap:wrap; }
  .hero-card { border:1px solid var(--rule); border-radius:var(--r); background:var(--white); overflow:hidden; }
  .stat-row { padding:24px 26px; border-bottom:1px solid var(--rule); }
  .stat-row:last-child { border-bottom:none; }
  .stat-num { font-family:'Instrument Serif',serif; font-size:2.2rem; color:var(--ink); letter-spacing:-1px; display:block; }
  .stat-lbl { font-size:0.78rem; color:var(--ink3); display:block; margin-top:2px; }

  /* PROBLEMS */
  #problems { background:var(--bg2); }
  .prob-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--rule); border:1px solid var(--rule); border-radius:var(--r); overflow:hidden; margin-top:52px; }
  .prob-card { background:var(--white); padding:30px 26px; transition:background 0.18s; }
  .prob-card:hover { background:var(--bg); }
  .prob-icon-wrap { width:36px; height:36px; border-radius:9px; background:var(--bg2); display:flex; align-items:center; justify-content:center; color:var(--ink2); margin-bottom:18px; }
  .prob-card h3 { font-size:0.92rem; font-weight:600; margin-bottom:9px; }
  .prob-card p { font-size:0.82rem; color:var(--ink2); line-height:1.65; font-weight:300; }
  .prob-tag { display:inline-block; margin-top:14px; font-size:0.67rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink3); }

  /* FEATURES */
  #features { background:var(--white); }
  .feat-table { margin-top:56px; border:1px solid var(--rule); border-radius:var(--r); overflow:hidden; }
  .feat-row { display:grid; grid-template-columns:44px 1fr 1fr; border-bottom:1px solid var(--rule); transition:background 0.15s; }
  .feat-row:last-child { border-bottom:none; }
  .feat-row:hover { background:var(--bg); }
  .feat-n { font-size:0.7rem; color:var(--ink3); font-weight:500; padding:26px 0 26px 26px; line-height:1; }
  .feat-main { padding:24px 20px 24px 4px; }
  .feat-title { font-size:0.9rem; font-weight:600; display:flex; align-items:center; gap:9px; margin-bottom:7px; color:var(--ink); }
  .feat-ico { color:var(--ink3); display:flex; flex-shrink:0; }
  .feat-desc { font-size:0.82rem; color:var(--ink2); line-height:1.6; font-weight:300; }
  .feat-side { padding:24px 28px 24px 20px; border-left:1px solid var(--rule); }

  /* COMPARISON */
  #comparison { background:var(--bg2); }
  .tbl-wrap { margin-top:52px; border:1px solid var(--rule); border-radius:var(--r); overflow-x:auto; background:var(--white); }
  table { width:100%; border-collapse:collapse; min-width:740px; }
  thead tr { background:var(--bg); border-bottom:2px solid var(--rule); }
  th { padding:14px 18px; text-align:center; font-size:0.75rem; font-weight:600; color:var(--ink2); white-space:nowrap; }
  th:first-child { text-align:left; color:var(--ink3); font-size:0.68rem; text-transform:uppercase; letter-spacing:0.08em; }
  th.th-s { color:var(--accent); background:var(--accent-bg); border-left:2px solid #bfdbfe; border-right:2px solid #bfdbfe; }
  tbody tr { border-bottom:1px solid var(--rule); transition:background 0.1s; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:var(--bg); }
  td { padding:11px 18px; text-align:center; font-size:0.8rem; color:var(--ink2); vertical-align:middle; }
  td:first-child { text-align:left; color:var(--ink); font-weight:500; font-size:0.83rem; }
  td.td-s { background:rgba(29,78,216,0.03); border-left:2px solid #bfdbfe; border-right:2px solid #bfdbfe; font-weight:500; color:var(--ink); }
  .pill { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:50px; font-size:0.72rem; font-weight:500; white-space:nowrap; }
  .p-g { background:var(--green-bg); color:var(--green); }
  .p-a { background:var(--amber-bg); color:var(--amber); }
  .p-r { background:var(--red-bg); color:var(--red); opacity:0.75; }
  .legend { display:flex; gap:18px; margin-top:14px; flex-wrap:wrap; }
  .leg { display:flex; align-items:center; gap:6px; font-size:0.73rem; color:var(--ink3); }

  /* ABOUT */
  #about { background:var(--white); }
  .about-grid { display:grid; grid-template-columns:1fr 1fr; gap:72px; align-items:start; }
  .about-vis { border:1px solid var(--rule); border-radius:var(--r); background:var(--bg); padding:36px; }
  .about-wordmark { font-family:'Instrument Serif',serif; font-style:italic; font-size:2.8rem; color:var(--ink); letter-spacing:-1px; margin-bottom:6px; }
  .about-sub { font-size:0.75rem; color:var(--ink3); margin-bottom:24px; }
  .chips { display:flex; flex-wrap:wrap; gap:7px; }
  .chip { background:var(--white); border:1px solid var(--rule); border-radius:50px; padding:4px 13px; font-size:0.73rem; color:var(--ink2); }
  .bits-row { display:flex; align-items:center; gap:12px; border:1px solid var(--rule); border-radius:var(--rs); padding:16px 18px; background:var(--white); margin-top:24px; }
  .bits-ico { color:var(--ink3); flex-shrink:0; display:flex; }
  .bits-txt { font-size:0.82rem; color:var(--ink2); line-height:1.5; }
  .bits-txt strong { color:var(--ink); font-weight:600; }
  .about-copy p { color:var(--ink2); line-height:1.8; font-size:0.9rem; font-weight:300; margin-bottom:16px; }
  .about-copy p:last-child { margin-bottom:0; }
  .email-link { display:inline-flex; align-items:center; gap:6px; color:var(--accent); font-size:0.83rem; text-decoration:none; font-weight:500; margin-top:8px; }
  .email-link:hover { text-decoration:underline; }

  /* WAITLIST */
  #waitlist { background:var(--bg2); text-align:center; }
  .wl-box { max-width:500px; margin:0 auto; background:var(--white); border:1px solid var(--rule); border-radius:var(--r); padding:44px 40px; text-align:left; }
  .wl-box h2 { text-align:center; }
  .wl-box .lead { text-align:center; margin:0 auto 32px; font-size:0.9rem; }
  .field { margin-bottom:13px; }
  .field label { display:block; font-size:0.7rem; font-weight:600; color:var(--ink3); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.07em; }
  .field input { width:100%; border:1px solid var(--rule); border-radius:var(--rs); padding:11px 15px; font-size:0.88rem; color:var(--ink); background:var(--bg); font-family:'Geist',sans-serif; outline:none; transition:border-color 0.15s, box-shadow 0.15s; }
  .field input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(29,78,216,0.08); background:var(--white); }
  .field input::placeholder { color:var(--ink3); }
  .note { font-size:0.72rem; color:var(--ink3); margin-top:12px; text-align:center; }
  .success { text-align:center; padding:24px 0; }
  .success-title { font-family:'Instrument Serif',serif; font-size:1.6rem; margin:12px 0 8px; }
  .success-sub { font-size:0.88rem; color:var(--ink2); font-weight:300; }

  /* FOOTER */
  footer { background:var(--ink); padding:56px 52px 36px; }
  .footer-grid { display:grid; grid-template-columns:2fr 1fr 1fr; gap:56px; max-width:1060px; margin:0 auto; }
  .footer-logo { display:flex; align-items:center; gap:10px; text-decoration:none; color:#fff; font-weight:600; font-size:0.9rem; margin-bottom:14px; }
  .footer-logo .logo-mark { background:rgba(255,255,255,0.1); }
  .footer-brand p { color:rgba(255,255,255,0.4); font-size:0.82rem; line-height:1.7; max-width:250px; font-weight:300; }
  .femail { color:rgba(255,255,255,0.55); font-size:0.82rem; text-decoration:none; display:inline-block; margin-top:14px; transition:color 0.15s; }
  .femail:hover { color:#fff; }
  .fcol h4 { font-size:0.68rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.35); margin-bottom:14px; }
  .fcol a { display:block; color:rgba(255,255,255,0.5); text-decoration:none; font-size:0.82rem; margin-bottom:9px; font-weight:300; transition:color 0.15s; }
  .fcol a:hover { color:#fff; }
  .footer-bottom { max-width:1060px; margin:44px auto 0; border-top:1px solid rgba(255,255,255,0.07); padding-top:24px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; }
  .footer-bottom p { color:rgba(255,255,255,0.25); font-size:0.72rem; }

  .reveal { opacity:0; transform:translateY(20px); transition:opacity 0.55s ease, transform 0.55s ease; }
  .reveal.in { opacity:1; transform:translateY(0); }

  @media(max-width:860px) {
    nav { padding:0 20px; }
    .nav-links { display:none; }
    section { padding:72px 20px; }
    #hero { padding-top:120px; padding-bottom:72px; }
    .hero-grid, .about-grid, .footer-grid { grid-template-columns:1fr; gap:40px; }
    .hero-card { display:flex; }
    .stat-row { flex:1; border-bottom:none; border-right:1px solid var(--rule); }
    .stat-row:last-child { border-right:none; }
    .prob-grid { grid-template-columns:1fr; }
    .feat-row { grid-template-columns:36px 1fr; }
    .feat-side { display:none; }
    footer { padding:48px 20px 32px; }
    .wl-box { padding:32px 24px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect } = React;
const { createRoot } = ReactDOM;

// SVG Icon system — clean stroke icons
const icons = {
  calendar: 'M8 2v3M16 2v3M3 8h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z',
  barChart: 'M3 3v18h18M7 16l4-4 4 4 4-4',
  eye: 'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8zM12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z',
  clipboard: 'M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2m-3 7h3m-6 4h6m-6-8h6',
  repeat: 'M17 1l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4m14 2v2a4 4 0 0 1-4 4H3',
  layers: 'M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5',
  user: 'M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z',
  cpu: 'M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18',
  shield: 'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z',
  trendingUp: 'M22 7l-8.5 8.5-5-5L2 17',
  link: 'M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71',
  lock: 'M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2zM7 11V7a5 5 0 0 1 10 0v4',
  settings: 'M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16zM12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4z',
  zap: 'M13 2L3 14h9l-1 8 10-12h-9l1-8z',
  globe: 'M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zM2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z',
  check: 'M20 6L9 17l-5-5',
  minus: 'M5 12h14',
  x: 'M18 6L6 18M6 6l12 12',
  mail: 'M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2zM22 6l-10 7L2 6',
  graduation: 'M22 10v6M2 10l10-5 10 5-10 5-10-5zM6 12v5c3 3 9 3 12 0v-5',
  arrow: 'M5 12h14M12 5l7 7-7 7',
};
const Ico = ({ name, size=16 }) => React.createElement('svg', {
  width:size, height:size, viewBox:'0 0 24 24', fill:'none',
  stroke:'currentColor', strokeWidth:1.75, strokeLinecap:'round', strokeLinejoin:'round',
}, React.createElement('path', { d: icons[name] }));

// ── NAV ──
function Nav() {
  const go = (id, e) => { e.preventDefault(); document.getElementById(id)?.scrollIntoView({behavior:'smooth'}); };
  return React.createElement('nav', null,
    React.createElement('a', {href:'#hero', className:'logo-link'},
      React.createElement('div', {className:'logo-mark'}, 'Q'),
      'Syncq Technologies'
    ),
    React.createElement('div', {className:'nav-links'},
      React.createElement('a', {href:'#problems', onClick:e=>go('problems',e)}, 'Problem'),
      React.createElement('a', {href:'#features', onClick:e=>go('features',e)}, 'Product'),
      React.createElement('a', {href:'#comparison', onClick:e=>go('comparison',e)}, 'Compare'),
      React.createElement('a', {href:'#about', onClick:e=>go('about',e)}, 'About'),
      React.createElement('button', {className:'btn btn-dark', onClick:()=>document.getElementById('waitlist')?.scrollIntoView({behavior:'smooth'})}, 'Join Waitlist')
    )
  );
}

// ── HERO ──
function Hero() {
  const go = id => document.getElementById(id)?.scrollIntoView({behavior:'smooth'});
  return React.createElement('section', {id:'hero'},
    React.createElement('div', {className:'container'},
      React.createElement('div', {className:'hero-grid'},
        React.createElement('div', null,
          React.createElement('div', {className:'badge'},
            React.createElement('span', {className:'badge-dot'}),
            'Now enrolling — Syncq Teams v1.0'
          ),
          React.createElement('h1', null, 'Campus life,', React.createElement('br'), React.createElement('em', null, 'finally unified')),
          React.createElement('p', {className:'lead', style:{marginTop:22}},
            'Syncq Teams brings together student identity, academics, clubs, and engagement into one platform — built for institutions that care about the full student experience.'
          ),
          React.createElement('div', {className:'hero-ctas'},
            React.createElement('button', {className:'btn btn-dark btn-lg', onClick:()=>go('waitlist')}, 'Join the Waitlist', React.createElement(Ico,{name:'arrow',size:14})),
            React.createElement('button', {className:'btn btn-outline btn-lg', onClick:()=>go('comparison')}, 'See Comparison')
          )
        ),
        React.createElement('div', {className:'hero-card'},
          React.createElement('div', {className:'stat-row'},
            React.createElement('span', {className:'stat-num'}, '17+'),
            React.createElement('span', {className:'stat-lbl'}, 'Core capabilities')
          ),
          React.createElement('div', {className:'stat-row'},
            React.createElement('span', {className:'stat-num'}, 'Zero'),
            React.createElement('span', {className:'stat-lbl'}, 'Adoption friction')
          ),
          React.createElement('div', {className:'stat-row'},
            React.createElement('span', {className:'stat-num'}, '1'),
            React.createElement('span', {className:'stat-lbl'}, 'Unified platform')
          )
        )
      )
    )
  );
}

// ── PROBLEMS ──
function Problems() {
  const items = [
    {icon:'calendar', title:'Fragmented Scheduling', desc:'Students juggle academics, clubs, and sports across multiple platforms with no unified calendar. Clashes are constant and avoidable.', tag:'Student-level'},
    {icon:'barChart', title:'Incomplete Evaluation', desc:'Institutes measure students purely by grades. Club leadership, campus involvement, and extracurricular impact remain invisible.', tag:'Institute-level'},
    {icon:'eye', title:'No Engagement Visibility', desc:'No centralized way to identify which students are involved and which are quietly disengaged. Institutes are flying blind.', tag:'Institute-level'},
    {icon:'clipboard', title:'Broken Inductions', desc:'Club inductions rely on Google Forms and spreadsheets. Applicants game priority orders. Data becomes unmanageable at scale.', tag:'Club-level'},
    {icon:'repeat', title:'Form Fatigue', desc:'Students re-enter the same personal information across ten-plus club applications every semester, with inconsistent results each time.', tag:'Student-level'},
    {icon:'layers', title:'Event Uncertainty', desc:'Clubs cannot predict event turnout. No reliable RSVP system leads to chronic over or under-preparation and wasted resources.', tag:'Club-level'},
  ];
  return React.createElement('section', {id:'problems'},
    React.createElement('div', {className:'container'},
      React.createElement('span', {className:'label'}, 'The Problem'),
      React.createElement('h2', null, React.createElement('em', null, 'Campus life'), ' is fundamentally fragmented'),
      React.createElement('p', {className:'lead'}, 'Students, clubs, and institutes operate in disconnected silos. No platform understands the complete picture.'),
      React.createElement('div', {className:'prob-grid reveal'},
        items.map((it, i) =>
          React.createElement('div', {className:'prob-card', key:i},
            React.createElement('div', {className:'prob-icon-wrap'}, React.createElement(Ico, {name:it.icon, size:17})),
            React.createElement('h3', null, it.title),
            React.createElement('p', null, it.desc),
            React.createElement('span', {className:'prob-tag'}, it.tag)
          )
        )
      )
    )
  );
}

// ── FEATURES ──
function Features() {
  const rows = [
    {icon:'user', title:'Unified Student Profile', l:'One source of truth for every student — auto-populated, consistent across all campus systems.', r:'Eliminates repeated form-filling and ensures clubs, academics, and admin always work from the same data.'},
    {icon:'cpu', title:'Smart Identity Parsing', l:'Auto-detect and categorise student roles, interests, and commitments without manual entry.', r:'Students are understood in full context — not just as a student ID or a form submission.'},

// ── WAITLIST ──
function Waitlist() {
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [phone, setPhone] = useState('');
  const [done, setDone] = useState(false);

  const submit = () => {
    if (!name || !email || !phone) { alert('Please fill in all fields.'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { alert('Please enter a valid email address.'); return; }
    const body = `New Waitlist Signup%0A%0AName: ${encodeURIComponent(name)}%0AEmail: ${encodeURIComponent(email)}%0APhone: ${encodeURIComponent(phone)}`;
    window.location.href = `mailto:info@syncqtech.com?subject=Waitlist Signup — ${encodeURIComponent(name)}&body=${body}`;
    setDone(true);
  };

  return React.createElement('section', {id:'waitlist'},
    React.createElement('div', {className:'container'},
      React.createElement('div', {className:'wl-box reveal'},
        !done
          ? React.createElement('div', null,
              React.createElement('span', {className:'label', style:{display:'block',textAlign:'center'}}, 'Early Access'),
              React.createElement('h2', null, 'Be first ', React.createElement('em', null, 'in the door')),
              React.createElement('p', {className:'lead'}, 'Join institutions getting early access to Syncq Teams. Limited spots available.'),
              React.createElement('div', {className:'field'},
                React.createElement('label', null, 'Full Name'),
                React.createElement('input', {type:'text', placeholder:'Your name', value:name, onChange:e=>setName(e.target.value)})
              ),
              React.createElement('div', {className:'field'},
                React.createElement('label', null, 'Email Address'),
                React.createElement('input', {type:'email', placeholder:'you@college.edu', value:email, onChange:e=>setEmail(e.target.value)})
              ),
              React.createElement('div', {className:'field'},
                React.createElement('label', null, 'Contact Number'),
                React.createElement('input', {type:'tel', placeholder:'+91 00000 00000', value:phone, onChange:e=>setPhone(e.target.value)})
              ),
              React.createElement('button', {className:'btn btn-dark', style:{width:'100%',marginTop:6,justifyContent:'center',padding:'13px'}, onClick:submit}, 'Reserve My Spot'),
              React.createElement('p', {className:'note'}, 'Your information is private. We\'ll only contact you about Syncq Teams access.')
            )
          : React.createElement('div', {className:'success'},
              React.createElement('div', {style:{color:'var(--green)',display:'flex',justifyContent:'center'}}, React.createElement(Ico,{name:'check',size:36})),
              React.createElement('div', {className:'success-title'}, "You're on the list"),
              React.createElement('p', {className:'success-sub'}, 'We\'ll reach out to ', React.createElement('strong', null, email), ' soon.')
            )
      )
    )
  );
}

// ── APP ──
function App() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
    }, { threshold: 0.1 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);

  return React.createElement('div', null,
    React.createElement(Nav),
    React.createElement(Hero),
    React.createElement('hr', {className:'rule'}),
    React.createElement(Problems),
    React.createElement('hr', {className:'rule'}),
    React.createElement(Features),
    React.createElement('hr', {className:'rule'}),
    React.createElement(Comparison),
    React.createElement('hr', {className:'rule'}),
    React.createElement(About),
    React.createElement('hr', {className:'rule'}),
    React.createElement(Waitlist),
    React.createElement(Footer)
  );
}

createRoot(document.getElementById('root')).render(React.createElement(App));
